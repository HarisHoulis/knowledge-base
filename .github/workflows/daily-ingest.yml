name: Daily Ingest

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview changes without committing or pushing"
        type: boolean
        required: false
        default: false
      limit:
        description: "Maximum entries to process per source"
        type: number
        required: false
        default: 0

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - uses: actions/cache@v4
        with:
          path: ~/.kb-pipeline/state.json
          key: kb-state-v1

      - name: Write YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        if: env.YOUTUBE_COOKIES != ''
        run: |
          echo "$YOUTUBE_COOKIES" | base64 -d > /tmp/yt-cookies.txt

      - name: Run daily ingest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          YT_COOKIES_PATH: /tmp/yt-cookies.txt
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          ARGS=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            ARGS="$ARGS --dry-run"
          fi
          if [[ -n "${{ inputs.limit }}" && "${{ inputs.limit }}" != "0" ]]; then
            ARGS="$ARGS --limit=${{ inputs.limit }}"
          fi
          bash scripts/daily-ingest.sh $ARGS


